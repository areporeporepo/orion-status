name: Artemis II Tracker
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Scrape NASA blog + extract telemetry via NIM
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
        run: |
          # Grab latest NASA mission updates
          NASA_TEXT=$(curl -s "https://www.nasa.gov/blogs/missions/2026/04/01/live-artemis-ii-launch-day-updates/" \
            | sed 's/<[^>]*>/ /g' | tr -s ' ' | head -c 6000)

          echo "Got ${#NASA_TEXT} chars from NASA blog"

          # Also try Space.com live updates
          SPACE_TEXT=$(curl -s "https://www.space.com/news/live/artemis-2-nasa-moon-mission-launch-updates-april-1-2026" \
            | sed 's/<[^>]*>/ /g' | tr -s ' ' | head -c 4000)

          COMBINED="${NASA_TEXT}\n\n${SPACE_TEXT}"

          # Send to NIM to extract numbers
          RESPONSE=$(curl -s https://integrate.api.nvidia.com/v1/chat/completions \
            -H "Authorization: Bearer $NIM_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(python3 -c "
          import json
          text = '''${COMBINED}'''[:8000]
          print(json.dumps({
            'model': 'nvidia/nemotron-3-nano-30b-a3b',
            'messages': [{'role': 'user', 'content': 'Extract the LATEST spacecraft telemetry numbers from these NASA Artemis II mission updates. Find distance from Earth (miles or km), speed (mph or km/s), altitude/apogee (miles or km). Return ONLY JSON: {\"distance_miles\":NUMBER_OR_NULL,\"speed_mph\":NUMBER_OR_NULL,\"altitude_miles\":NUMBER_OR_NULL}\n\nText: ' + text}],
            'max_tokens': 100,
            'temperature': 0
          }))
          ")")

          echo "NIM response: $RESPONSE"
          echo "NIM_RESPONSE<<EOF" >> $GITHUB_ENV
          echo "$RESPONSE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Parse and push to Cloudflare KV
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          KV_NAMESPACE_ID: "81774a0a72994d188ce5b0e3e23a812e"
        run: |
          TELEMETRY=$(python3 << 'PYEOF'
          import json, re, sys
          from datetime import datetime, timezone

          response = """${{ env.NIM_RESPONSE }}"""

          try:
              d = json.loads(response)
              content = d.get("choices", [{}])[0].get("message", {}).get("content", "")
              m = re.search(r'\{[^}]+\}', content)
              if not m:
                  print("NO_DATA")
                  sys.exit(0)

              data = json.loads(m.group())
              dist_miles = data.get("distance_miles") or data.get("altitude_miles")

              if not dist_miles:
                  print("NO_DATA")
                  sys.exit(0)

              dist_km = round(dist_miles * 1.60934)
              moon_km = max(0, round(384400 - dist_km))
              vel = round((data.get("speed_mph", 0) or 0) * 1.60934 / 3600, 2)
              met = int((datetime.now(timezone.utc) - datetime(2026, 4, 1, 22, 35, 0, tzinfo=timezone.utc)).total_seconds() * 1000)

              phase = "earth_orbit"
              if dist_km < 2000: phase = "earth_orbit"
              elif moon_km < 20000: phase = "lunar_flyby"
              elif dist_km < moon_km: phase = "transit_to_moon"
              else: phase = "return_to_earth"

              result = {
                  "distanceEarthKm": dist_km,
                  "distanceMoonKm": moon_km,
                  "velocityKmS": vel,
                  "missionElapsedMs": met,
                  "phase": phase,
                  "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
                  "source": "nim_blog"
              }
              print(json.dumps(result))
          except Exception as e:
              print(f"NO_DATA: {e}", file=sys.stderr)
              print("NO_DATA")
          PYEOF
          )

          echo "Telemetry: $TELEMETRY"

          if [ "$TELEMETRY" != "NO_DATA" ] && [ -n "$TELEMETRY" ]; then
            curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/position" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "$TELEMETRY"
            echo "Pushed to KV!"
          else
            echo "No telemetry extracted, skipping KV update"
          fi
